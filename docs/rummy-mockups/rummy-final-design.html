<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Rummy — Idea 3 (experiment): No tabs, board shows Piles + Melds</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@rolemodel/optics@2.4.0/dist/css/optics+phosphor_icons.css">
<link rel="stylesheet" href="mockup-extras.css">
</head>
<body>
<div class="mock-flag">IDEA 3 (EXPERIMENT) — tabs removed, Piles + Melds shown together</div>

<div class="game-view">

  <div class="panel panel--padded game-view__game-board">
    <header class="panel__header gap-xs">
      <button class="btn btn--no-border btn--icon btn--small"><i class="ph ph-caret-left icon icon--large"></i></button>
      <h2>Rummy Round 3</h2>
    </header>

    <div class="panel__content">
      <div>
        <div class="melds-board">
          <div class="meld meld--run-collapsed" title="Click to expand">
            <div class="meld__label"><span>Meld 1 · Run</span><span class="badge">6 cards</span></div>
            <div class="meld__cards">
              <img src="cards/4_of_hearts.png" class="playing-card playing-card--sm">
              <span class="meld__ellipsis">…</span>
              <img src="cards/9_of_hearts.png" class="playing-card playing-card--sm">
            </div>
          </div>

          <div class="meld">
            <div class="meld__label"><span>Meld 2 · Set</span><span class="badge">3 cards</span></div>
            <div class="meld__cards">
              <img src="cards/king_of_spades.png" class="playing-card playing-card--sm">
              <img src="cards/king_of_hearts.png" class="playing-card playing-card--sm">
              <img src="cards/king_of_diamonds.png" class="playing-card playing-card--sm">
            </div>
          </div>

          <div class="meld meld--run-collapsed" title="Click to expand">
            <div class="meld__label"><span>Meld 3 · Run</span><span class="badge">3 cards</span></div>
            <div class="meld__cards">
              <img src="cards/2_of_clubs.png" class="playing-card playing-card--sm">
              <span class="meld__ellipsis">…</span>
              <img src="cards/4_of_clubs.png" class="playing-card playing-card--sm">
            </div>
          </div>

          <div class="meld">
            <div class="meld__label"><span>Meld 4 · Set</span><span class="badge">4 cards</span></div>
            <div class="meld__cards">
              <img src="cards/7_of_diamonds.png" class="playing-card playing-card--sm">
              <img src="cards/7_of_clubs.png" class="playing-card playing-card--sm">
              <img src="cards/7_of_spades.png" class="playing-card playing-card--sm">
              <img src="cards/7_of_hearts.png" class="playing-card playing-card--sm">
            </div>
          </div>

          <div class="meld">
            <div class="meld__label"><span>Meld 5 · Set</span><span class="badge">3 cards</span></div>
            <div class="meld__cards">
              <img src="cards/jack_of_clubs.png" class="playing-card playing-card--sm">
              <img src="cards/jack_of_diamonds.png" class="playing-card playing-card--sm">
              <img src="cards/jack_of_spades.png" class="playing-card playing-card--sm">
            </div>
          </div>
        </div>
      </div>

      <div style="margin-top: var(--op-space-medium);">
        <div class="flex flex-no-wrap justify-center items-center gap-xl">
          <div>
            <div class="meld__label"><span>Deck</span><span class="badge">73 cards</span></div>
            <img src="cards/playing-card-back.jpg" alt="Back of card" class="playing-card playing-card--lg">
          </div>
          <div>
            <div class="meld__label"><span>Discard</span><span class="badge">1 card</span></div>
            <img src="cards/8_of_spades.png" alt="8 of Spades" class="playing-card playing-card--lg">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="game-view__game-feed panel panel--padded panel--primary">
    <header class="panel__header op-split">
      <div class="badge badge--primary">Your Turn</div>
    </header>

    <div class="panel__content op-stack flex-grow-1 gap-none">
      <div class="turn-phase-forms">
        <form class="game-actions">
          <h4><i class="ph ph-check-square icon icon--large"></i> Phase 1 — Draw</h4>
          <div class="game-actions__options">
            <button type="submit" class="btn btn--primary" disabled>Draw from Deck</button>
            <button type="submit" class="btn btn--secondary" disabled>Take Discard (8♠)</button>
          </div>
        </form>
        <div class="game-actions">
          <h4>Phase 2 - Meld</h4>
          <form>
            <div class="game-actions__options">
              <select class="op-input">
                <option selected>New Meld</option>
                <option>Meld 1 (4♥…9♥)</option>
                <option>Meld 4 (7s)</option>
              </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--op-space-2x-small) var(--op-space-medium); margin-top: var(--op-space-small);">
              <div class="flex items-center gap-xs">
                <input type="checkbox" class="form-control" id="card-5-clubs">
                <label for="card-5-clubs">5 Clubs</label>
              </div>
              <div class="flex items-center gap-xs">
                <input type="checkbox" class="form-control" id="card-a-hearts">
                <label for="card-a-hearts">A Hearts</label>
              </div>
              <div class="flex items-center gap-xs">
                <input type="checkbox" class="form-control" id="card-a-clubs">
                <label for="card-a-clubs">A Clubs</label>
              </div>
              <div class="flex items-center gap-xs">
                <input type="checkbox" class="form-control" id="card-8-diamonds">
                <label for="card-8-diamonds">8 Diamonds</label>
              </div>
              <div class="flex items-center gap-xs">
                <input type="checkbox" class="form-control" id="card-3-hearts">
                <label for="card-3-hearts">3 Hearts</label>
              </div>
              <div class="flex items-center gap-xs">
                <input type="checkbox" class="form-control" id="card-q-diamonds">
                <label for="card-q-diamonds">Q Diamonds</label>
              </div>
            </div>
            <div class="game-actions__options" style="margin-top: var(--op-space-small);">
              <button type="submit" class="btn btn--primary">Meld/Lay-off Selected</button>
            </div>
          </form>
        </div>
        <form class="game-actions">
          <h4>End Turn</h4>
          <div class="game-actions__options">
            <select class="op-input">
              <option>Which card?</option>
              <option>5 Clubs</option>
              <option>A Hearts</option>
              <option>A Clubs</option>
              <option>8 Diamonds</option>
              <option>3 Hearts</option>
              <option selected>Q Diamonds</option>
            </select>
          </div>
          <div class="game-actions__options">
            <button type="submit" class="btn btn--danger">Discard &amp; End Turn</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="game-view__hand panel panel--secondary">
    <header class="panel__header"><h2>Hand</h2></header>
    <div class="panel__content">
      <div class="cards-stacked flex margin-top-md">
        <img src="cards/5_of_clubs.png" class="playing-card playing-card--lg playing-card--hover">
        <img src="cards/ace_of_hearts.png" class="playing-card playing-card--lg playing-card--hover">
        <img src="cards/ace_of_clubs.png" class="playing-card playing-card--lg playing-card--hover">
        <img src="cards/8_of_diamonds.png" class="playing-card playing-card--lg playing-card--hover">
        <img src="cards/3_of_hearts.png" class="playing-card playing-card--lg playing-card--hover">
        <img src="cards/queen_of_diamonds.png" class="playing-card playing-card--lg playing-card--hover">
      </div>
    </div>
  </div>

  <div class="game-view__extra panel panel--secondary">
    <header class="panel__header"><h2>Players</h2></header>
    <div class="panel__content players">
      <div class="players__hand op-stack gap-xs">
        <details class="accordion">
          <summary>
            <div class="accordion__marker"><i class="ph ph-caret-right icon icon--small"></i></div>
            <span class="accordion__header">Tony Stark</span>
            <div>Cards: <strong>6</strong></div>
          </summary>
        </details>
      </div>
    </div>
  </div>

</div>

</body>
</html>
